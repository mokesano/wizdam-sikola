# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.
# .github/workflows/codacy-security-scan.yml
# .github/workflows/codacy.yml

name: Codacy Security Scan

on:
  push:
    branches: [ "master", "develop", "production" ]  # ✅ Sangia-Scieco menggunakan 'master'
  pull_request:
    branches: [ "master", "develop", "production" ]
  schedule:
    - cron: '35 15 * * 2'  # Selasa 15:35 UTC

jobs:
  codacy-security-scan:
    # Mencegah eksekusi pada fork PR tanpa akses secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read              # Untuk checkout
      security-events: write      # Wajib untuk upload SARIF
      actions: read               # Untuk status check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Penting untuk analisis diff

      # ✅ Setup PHP environment (backend utama project)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'  # Sesuaikan dengan versi PHP di composer.json
          tools: composer
          coverage: none
          extensions: mbstring, pdo, pdo_mysql, json, curl

      # ✅ Setup Node.js untuk frontend React + Vite
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # ✅ Install PHP dependencies
      - name: Install PHP Dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --no-interaction --prefer-dist
          fi

      # ✅ Install JavaScript dependencies
      - name: Install JS Dependencies
        run: |
          if [ -f package.json ]; then
            npm ci --ignore-scripts --no-audit --no-fund
          fi

      # ✅ Run Codacy Analysis CLI
      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          # Token opsional - hapus jika hanya ingin SARIF lokal
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          
          # Output SARIF untuk GitHub Code Scanning
          output: results.sarif
          format: sarif
          
          # Mode kompatibilitas GitHub Code Scanning
          code-scanning: true
          
          # Force exit code 0 agar workflow tidak gagal
          max-allowed-issues: 2147483647
          
          # ✅ Exclude paths yang tidak relevan untuk Sangia-Scieco
          exclude-paths: >-
            **/node_modules/**,
            **/vendor/**,
            **/.phpunit.cache/**,
            **/cache/**,
            **/logs/**,
            **/*.min.js,
            **/dist/**,
            **/build/**,
            **/UIUX-design/**,
            **/docs/**,
            **/database_*.sql,
            **/public/assets/**,
            **/src/**/*.test.js,
            **/tests/**
          
          # ✅ Filter untuk PHP & JavaScript/React
          verbose: true

      # ✅ Upload SARIF ke GitHub Code Scanning
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: codacy-security

      # ✅ Optional: Upload hasil sebagai artifact untuk debugging
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codacy-sarif-results
          path: results.sarif
          retention-days: 7
