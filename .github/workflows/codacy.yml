# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.
# .github/workflows/codacy-security-scan.yml
# .github/workflows/codacy.yml

name: Codacy Security Scan

on:
  push:
    branches: [ "master", "develop", "production" ]
  pull_request:
    branches: [ "master", "develop", "production" ]
  schedule:
    - cron: '35 15 * * 2'

jobs:
  codacy-security-scan:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ✅ Run Codacy Analysis CLI - TANPA instalasi dependencies
      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          # Token opsional - hapus jika hanya ingin SARIF lokal untuk GitHub
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          
          # Output SARIF untuk GitHub Code Scanning
          output: results.sarif
          format: sarif
          
          # Mode kompatibilitas GitHub Code Scanning
          code-scanning: true
          
          # Force exit code 0 agar workflow tidak gagal karena temuan
          max-allowed-issues: 2147483647
          
          # ✅ Exclude paths untuk mengurangi false positive & skip folder tidak relevan
          exclude-paths: >-
            **/node_modules/**,
            **/vendor/**,
            **/cache/**,
            **/logs/**,
            **/*.min.js,
            **/dist/**,
            **/build/**,
            **/UIUX-design/**,
            **/docs/**,
            **/database_*.sql,
            **/public/assets/**,
            **/tests/**,
            **/.phpunit.cache/**
          
          # Verbosity untuk debugging (opsional, bisa dihapus jika sudah stabil)
          verbose: true

      # ✅ Upload SARIF ke GitHub Code Scanning
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: codacy-security

      # ✅ Optional: Upload SARIF sebagai artifact untuk debugging
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codacy-sarif-results
          path: results.sarif
          retention-days: 7
