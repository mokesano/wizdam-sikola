# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.
# .github/workflows/codacy-security-scan.yml
# .github/workflows/codacy.yml

name: Codacy Security Scan

on:
  push:
    branches: [ "master", "develop", "production" ]  # ✅ Sesuaikan dengan workflow branch promotion Anda
  pull_request:
    branches: [ "master", "develop", "production" ]
  schedule:
    - cron: '35 15 * * 2'  # Tetap: Selasa 15:35 UTC

jobs:
  codacy-security-scan:
    # ✅ Mencegah eksekusi pada fork PR yang tidak memiliki akses secrets
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read              # Untuk actions/checkout
      security-events: write      # Wajib untuk upload SARIF ke GitHub Code Scanning
      actions: read               # Untuk status check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Penting untuk analisis diff yang akurat

      # ✅ Setup PHP environment (karena project menggunakan PHP backend)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      # ✅ Setup Node.js untuk frontend scanning
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # ✅ Install dependencies (opsional, tapi membantu Codacy memahami struktur)
      - name: Install dependencies
        run: |
          if [ -f composer.json ]; then composer install --no-dev --no-interaction; fi
          if [ -f package.json ]; then npm ci --ignore-scripts; fi

      # ✅ Run Codacy Analysis CLI dengan parameter yang benar
      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          # ⚠️ Token opsional: jika tidak diisi, hasil hanya lokal (tidak dikirim ke Codacy dashboard)
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          
          # ✅ Output SARIF untuk GitHub Code Scanning
          output: results.sarif
          format: sarif
          
          # ✅ Aktifkan mode kompatibilitas GitHub (parameter yang benar)
          code-scanning: true
          
          # ✅ Force exit code 0 agar workflow tidak gagal meski ada temuan
          max-allowed-issues: 2147483647
          
          # ✅ Filter: skip folder yang tidak relevan untuk mengurangi false positive
          exclude-paths: >-
            **/node_modules/**,
            **/vendor/**,
            **/cache/**,
            **/logs/**,
            **/*.min.js,
            **/dist/**,
            **/build/**
          
          # ✅ Verbosity untuk debugging (bisa dihapus jika sudah stabil)
          verbose: true

      # ✅ Upload SARIF ke GitHub Code Scanning (dengan validasi file)
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3  # ✅ Gunakan v3 yang stabil
        if: always() && hashFiles('results.sarif') != ''  # ✅ Hanya upload jika file SARIF ada
        with:
          sarif_file: results.sarif
          category: codacy  # ✅ Unik, penting jika ada multiple tools
