# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the
# GitHub Advanced Security code scanning feature.  For more information on
# the Codacy security scan action usage and parameters, see
# https://github.com/codacy/codacy-analysis-cli-action.
# For more information on Codacy Analysis CLI in general, see
# https://github.com/codacy/codacy-analysis-cli.
# .github/workflows/codacy-security-scan.yml
# .github/workflows/codacy.yml

name: Codacy Security Scan

on:
  push:
    branches: [ "master", "develop", "production" ]
  pull_request:
    branches: [ "master", "develop", "production" ]
  schedule:
    - cron: '35 15 * * 2'

jobs:
  codacy-security-scan:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none
          extensions: mbstring, pdo, pdo_mysql, json, curl

      # ✅ Setup Node.js TANPA cache-dependency-path
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # ✅ Hapus cache-dependency-path yang menyebabkan error

      # Install PHP dependencies
      - name: Install PHP Dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-dev --no-interaction --prefer-dist
          fi

      # ✅ Install JS dependencies dengan fallback
      - name: Install JS Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts --no-audit --no-fund
          elif [ -f yarn.lock ]; then
            yarn install --frozen-lockfile --ignore-scripts
          elif [ -f package.json ]; then
            npm install --ignore-scripts --no-audit --no-fund
          else
            echo "No Node.js dependencies found"
          fi

      # Run Codacy Analysis
      - name: Run Codacy Analysis
        uses: codacy/codacy-analysis-cli-action@v4.4.7
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          output: results.sarif
          format: sarif
          code-scanning: true
          max-allowed-issues: 2147483647
          exclude-paths: >-
            **/node_modules/**,
            **/vendor/**,
            **/.phpunit.cache/**,
            **/cache/**,
            **/logs/**,
            **/*.min.js,
            **/dist/**,
            **/build/**,
            **/UIUX-design/**,
            **/docs/**,
            **/database_*.sql,
            **/public/assets/**,
            **/tests/**
          verbose: true

      # Upload SARIF
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
          category: codacy-security

      # Upload artifact
      - name: Upload SARIF as Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codacy-sarif-results
          path: results.sarif
          retention-days: 7
